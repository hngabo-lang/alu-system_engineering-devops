<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404 - Ceci n'est pas une page</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root {
    --bg: #0d0f10;
    --panel: #16191a;
    --amber: #ffb000;
    --amber-dim: #b57d00;
    --text: #d8d8d0;
    --muted: #6a6f6a;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .terminal {
    width: 100%;
    max-width: 720px;
    background: var(--panel);
    border: 1px solid #26292a;
    border-radius: 8px;
    box-shadow: 0 0 0 1px #000, 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
  }

  .titlebar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: #1c1f20;
    border-bottom: 1px solid #26292a;
  }

  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot.red { background: #ff5f56; }
  .dot.yellow { background: #ffbd2e; }
  .dot.green { background: #27c93f; }

  .titlebar span.label {
    margin-left: 10px;
    color: var(--muted);
    font-size: 12px;
  }

  .screen {
    padding: 28px 26px 32px;
    line-height: 1.6;
    font-size: 14px;
  }

  .prompt { color: var(--amber-dim); }
  .cmd { color: var(--text); }

  .big404 {
    color: var(--amber);
    font-size: 56px;
    font-weight: 700;
    margin: 18px 0 6px;
    letter-spacing: 2px;
    text-shadow: 0 0 18px rgba(255,176,0,0.35);
  }

  .message {
    color: var(--text);
    font-size: 16px;
    margin-bottom: 4px;
  }

  .sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 22px;
  }

  .pipe {
    display: inline-block;
    width: 9px;
    height: 16px;
    background: var(--amber);
    animation: blink 1s steps(1) infinite;
    vertical-align: middle;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  a.home {
    color: var(--bg);
    background: var(--amber);
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
  }

  a.home:hover {
    background: #ffc84d;
  }
</style>
</head>
<body>
  <div class="terminal">
    <div class="titlebar">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <span class="label">web-01 &mdash; zsh &mdash; 80x24</span>
    </div>
    <div class="screen">
      <div><span class="prompt">$</span> <span class="cmd">curl -sI ./this-page</span></div>
      <div class="big404">404</div>
      <div class="message">Ceci n'est pas une page.</div>
      <div class="sub">This is not a page &mdash; the route you followed leads nowhere on this server.</div>
      <div>
        <span class="prompt">$</span> <span class="cmd">cd ~</span> <span class="pipe"></span>
      </div>
      <br>
      <a class="home" href="/">return home</a>
    </div>
  </div>
</body>
</html>
